<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1430"/>
      <stop offset="0.6" stop-color="#0F1E3A"/>
      <stop offset="1" stop-color="#0A1228"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#20335C" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#grid)" opacity="0.35"/>

  <!-- Graph background -->
  <g opacity="0.55">
    <rect x="90" y="220" width="900" height="520" rx="24" fill="#0E1A37" stroke="#1F3566"/>
    <path d="M140 680 L260 610 L380 640 L520 520 L700 560 L900 420" stroke="url(#accent)" stroke-width="6" fill="none"/>
    <path d="M140 680 L260 610 L380 640 L520 520 L700 560 L900 420" stroke="#22D3EE" stroke-width="16" opacity="0.15" filter="url(#glow)"/>
    <g fill="url(#accent2)" opacity="0.6">
      <rect x="180" y="520" width="36" height="160" rx="8"/>
      <rect x="260" y="470" width="36" height="210" rx="8"/>
      <rect x="340" y="560" width="36" height="120" rx="8"/>
      <rect x="420" y="430" width="36" height="250" rx="8"/>
      <rect x="500" y="500" width="36" height="180" rx="8"/>
      <rect x="580" y="380" width="36" height="300" rx="8"/>
      <rect x="660" y="460" width="36" height="220" rx="8"/>
      <rect x="740" y="340" width="36" height="340" rx="8"/>
      <rect x="820" y="420" width="36" height="260" rx="8"/>
    </g>
  </g>

  <!-- Car silhouette -->
  <g transform="translate(130 690)" opacity="0.95">
    <path d="M110 120C140 90 210 70 300 70H470C520 70 570 90 610 115L690 170H810C860 170 900 205 900 250V280H110V120Z" fill="#0F1E3A" stroke="#2B4C8F" stroke-width="4"/>
    <path d="M230 170H520C560 170 600 190 640 220H260C240 220 220 200 220 180C220 174 224 170 230 170Z" fill="#10244A"/>
    <circle cx="260" cy="280" r="46" fill="#0B1430" stroke="#2B4C8F" stroke-width="6"/>
    <circle cx="720" cy="280" r="46" fill="#0B1430" stroke="#2B4C8F" stroke-width="6"/>
    <circle cx="260" cy="280" r="20" fill="#1E3A8A"/>
    <circle cx="720" cy="280" r="20" fill="#1E3A8A"/>
  </g>

  <!-- Text -->
  <g fill="#E2E8F0">
    <text x="90" y="140" font-size="54" font-family="Arial, sans-serif" font-weight="700">Машин авах/зарах уу?</text>
    <text x="90" y="200" font-size="26" font-family="Arial, sans-serif" fill="#BFD3FF">
      Зах зээлийн үнэ, гүйлтийн тархалтыг 30 секундэд
    </text>
    <text x="90" y="235" font-size="26" font-family="Arial, sans-serif" fill="#BFD3FF">
      харуулдаг үнэгүй хэрэгсэл
    </text>
  </g>

  <!-- Badge -->
  <g transform="translate(780 110)">
    <rect width="210" height="58" rx="14" fill="#10B981" opacity="0.2" stroke="#34D399"/>
    <text x="28" y="38" font-size="22" font-family="Arial, sans-serif" fill="#A7F3D0" font-weight="700">ОДОО ҮНЭГҮЙ</text>
  </g>

  <!-- CTA -->
  <g transform="translate(90 900)">
    <rect width="420" height="64" rx="16" fill="#1D4ED8"/>
    <text x="28" y="42" font-size="24" font-family="Arial, sans-serif" fill="#E2E8F0" font-weight="700">
      Линкээр орж туршаарай
    </text>
  </g>
</svg>
